version: 1
robot_id: "robot_ugv_beast_v1"
format: "json_by_name"
metadata:
  author: "Cyberwave"
  created: "2025-12-17"
  notes: "Mapping for UGV Beast - Wheels, Pan-Tilt, and Fixed joints"
  # UUID of the digital twin. Override via CYBERWAVE_TWIN_UUID env var (set by edge core).
  twin_uuid: "00000000-0000-0000-0000-000000000000"

joints:
  # Wheel joints (continuous rotation)
  - ros_name: "left_up_wheel_link_joint"
    mqtt_name: "left_up_wheel_link_joint"
    transform:
      scale: 1.0
      offset: 0.0
      invert: false
  - ros_name: "left_down_wheel_link_joint"
    mqtt_name: "left_down_wheel_link_joint"
    transform:
      scale: 1.0
      offset: 0.0
      invert: false
  - ros_name: "right_up_wheel_link_joint"
    mqtt_name: "right_up_wheel_link_joint"
    transform:
      scale: 1.0
      offset: 0.0
      invert: false
  - ros_name: "right_down_wheel_link_joint"
    mqtt_name: "right_down_wheel_link_joint"
    transform:
      scale: 1.0
      offset: 0.0
      invert: false
  # Pan-tilt mechanism joints (Actuated via Servos)
  - ros_name: "pt_base_link_to_pt_link1"
    mqtt_name: "pt_base_link_to_pt_link1"
    transform:
      scale: 1.0
      offset: 0.0
      invert: false
  - ros_name: "pt_link1_to_pt_link2"
    mqtt_name: "pt_link1_to_pt_link2"
    transform:
      scale: 1.0
      offset: 0.0
      invert: false
  # Fixed joints (Structural)
  - ros_name: "base_footprint_joint"
    mqtt_name: "base_footprint_joint"
    transform:
      scale: 1.0
      offset: 0.0
      invert: false
  - ros_name: "lidar_joint"
    mqtt_name: "lidar_joint"
    transform:
      scale: 1.0
      offset: 0.0
      invert: false
  - ros_name: "camera_joint"
    mqtt_name: "camera_joint"
    transform:
      scale: 1.0
      offset: 0.0
      invert: false

capabilities:
  supports_atomic_pose: true
  # Determines which upstream telemetry topics to publish (joint, pose, or both)
  upstream_mode: "both"
  upstream_topics:
    - pose   # {prefix}cyberwave/pose/{twin_uuid}/update
    - joint  # {prefix}cyberwave/joint/{twin_uuid}/update

# Command Registry class for this robot
#command_registry: "mqtt_bridge.plugins.ugv_beast_command_handler.UGVBeastCommandRegistry"
command_registry: "mqtt_bridge.plugins.ugv_beast_command_handler.CommandRegistry"

# Camera streaming configuration
camera:
  # Video frame format. Potential alternatives:
  # - "yuv420p": Standard WebRTC format, highly compatible (Default)
  # - "rgb24": Raw RGB format (requires conversion in most browsers)
  # - "bgr24": Raw BGR format (standard OpenCV format)
  # - "nv12": Common hardware-accelerated format
  format: "yuv420p"
  encoding: "rgb8"
  fps: 15  # Match webrtc.fps and camera framerate
  image_width: 640  # Match actual camera resolution
  image_height: 480  # Match actual camera resolution

# Internal Odometry calculation settings (for robots without /odom topic)
internal_odometry:
  enabled: true
  track_width: 0.23   # meters
  wheel_radius: 0.04  # meters
  left_wheel_joints: ["left_up_wheel_link_joint", "left_down_wheel_link_joint"]
  right_wheel_joints: ["right_up_wheel_link_joint", "right_down_wheel_link_joint"]

# Robot motion constants for safe trajectory generation
robot_constants:
  # Maximum joint velocities (rad/s) 
  max_velocities:
    # Wheel joints (continuous rotation, higher speed)
    left_up_wheel_link_joint: 10.0
    left_down_wheel_link_joint: 10.0
    right_up_wheel_link_joint: 10.0
    right_down_wheel_link_joint: 10.0
    # Pan-tilt joints (limited range, slower speed)
    pt_base_link_to_pt_link1: 1.5  # Pan joint
    pt_link1_to_pt_link2: 1.5      # Tilt joint
    default: 2.0 
  
  # Maximum joint accelerations (rad/s²)
  max_accelerations:
    # Wheel joints (higher acceleration for responsive movement)
    left_up_wheel_link_joint: 15.0
    left_down_wheel_link_joint: 15.0
    right_up_wheel_link_joint: 15.0
    right_down_wheel_link_joint: 15.0
    # Pan-tilt joints (lower acceleration for stability)
    pt_base_link_to_pt_link1: 3.0
    pt_link1_to_pt_link2: 3.0
    default: 5.0
  
  # Minimum trajectory time (seconds) - for responsive UGV control
  min_trajectory_time: 0.2
  
  # Safety factor to multiply calculated time
  time_safety_factor: 1.3

