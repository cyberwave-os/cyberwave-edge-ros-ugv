name: "ugv-ros2-jazzy"
version: "1.0.0"
description: "Custom Raspberry Pi OS image for UGV with ROS 2 Jazzy and MQTT Bridge"

# Base image configuration
base:
  image: "ubuntu-24.04-preinstalled-server-arm64+raspi.img.xz"
  url: "https://cdimage.ubuntu.com/releases/24.04/release/"
  checksum: "sha256"  # Will be verified during download

# Target architecture
target:
  architecture: arm64
  platform: raspi4

# Image size (adjust based on your needs)
size: 16G

# Layer order (processed sequentially)
layers:
  - 00-base                # Base system packages and configuration
  - 10-ros2-jazzy          # ROS 2 Jazzy installation
  - 20-ugv-system          # UGV-specific system configuration (boot, serial, Docker)
  - 30-ugv-workspace       # Build ROS 2 workspace with UGV packages
  - 40-ugv-apps            # Additional UGV applications
  - 50-custom-files        # Custom files (mqtt_bridge, launch files, scripts)

# Default user configuration
user:
  name: ubuntu
  password: ubuntu  # Change this for production!
  groups:
    - sudo
    - dialout      # Serial port access
    - docker       # Docker access
    - gpio         # GPIO access
    - i2c          # I2C access
    - spi          # SPI access
    - audio        # Audio access
    - video        # Video/camera access
    - plugdev      # USB device access

# Network configuration
network:
  hostname: ugv-robot
  ssh:
    enabled: true
    permit_root_login: false
    password_authentication: true
    port: 22

# Locale and timezone
locale:
  language: en_US.UTF-8
  timezone: UTC

# Build options
build:
  parallel: true       # Enable parallel package installation
  cache: true          # Cache downloaded packages
  compression: xz      # Compression format (xz, gz, or none)
  checksum: true       # Generate checksums for output
  
# Optional: Custom packages to install globally
packages:
  - vim
  - git
  - htop
  - tmux
  - curl
  - wget
  - net-tools
  - rsync
  - python3-pip
  - build-essential

# Optional: Services to enable
services:
  enable:
    - ssh
    - docker
  disable:
    - bluetooth  # Disable if not needed to save resources
